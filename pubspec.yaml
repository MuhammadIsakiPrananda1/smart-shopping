name: smart_shopping_list
description: "A new Flutter project."
publish_to: 'none' 

version: 1.2.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.3.3
  intl: ^0.19.0
  mobile_scanner: ^5.1.0
  flutter_local_notifications: ^17.0.0
  in_app_purchase: ^3.2.0
  pdf: ^3.10.8
  csv: ^6.0.0
  shimmer: ^3.0.0
  path_provider: ^2.1.2
  dartz: ^0.10.1
  share_plus: ^10.1.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
